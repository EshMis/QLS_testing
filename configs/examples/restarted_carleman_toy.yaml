system: {name: toy_linear_ode, toy_coupling: 0.5}
linearization:
  name: adaptive_restarted_carleman
  settings:
    initial_order: 1
    max_order: 3
    segment_duration: 0.1
    tolerance: 1.0e-5
integrator: {name: krylov_exponential}
qls: {name: classical}
time: {t_final: 0.5, dt: 0.05, n_points: 11}
output: {directory: outputs/restarted_toy, save_plot: true}
random_seed: 42
