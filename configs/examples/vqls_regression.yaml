system:
  name: toy_linear_ode
  toy_coupling: 0.5
linearization:
  name: carleman
  settings: {order: 1}
integrator:
  name: backward_euler
qls:
  name: pennylane_vqls
  settings:
    layers: 2
    max_steps: 180
    stepsize: 0.06
    tolerance: 1.0e-8
    shots: 400
    warm_start: true
time: {t_final: 0.2, dt: 0.1, n_points: 3}
output: {directory: outputs/vqls_regression, save_plot: false}
error: {enabled: true}
complexity: {enabled: true}
random_seed: 7
