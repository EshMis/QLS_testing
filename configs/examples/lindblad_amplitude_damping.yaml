system:
  name: lindblad_amplitude_damping
  lindblad_decay_rate: 1.0
linearization: {name: carleman, settings: {order: 1}}
integrator: {name: krylov_exponential}
qls: {name: classical}
time: {t_final: 5.0, dt: 0.1, n_points: 101}
output: {directory: outputs/lindblad, save_plot: true}
random_seed: 42

